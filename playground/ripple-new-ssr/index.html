<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>ripple-new SSR</title>
		<style>
			:root {
				color-scheme: light dark;
				--fg: #1a1a1a;
				--muted: #6b6b6b;
				--border: #d8d8d8;
				--accent: #2563eb;
				--bg: #ffffff;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--fg: #f0f0f0;
					--muted: #9a9a9a;
					--border: #2a2a2a;
					--accent: #60a5fa;
					--bg: #0e0e0e;
				}
			}
			body {
				margin: 0;
				font:
					15px/1.6 -apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					system-ui,
					sans-serif;
				color: var(--fg);
				background: var(--bg);
			}
			main.app {
				max-width: 640px;
				margin: 0 auto;
				padding: 48px 24px;
			}
			main.app h1 {
				font-size: 24px;
				margin: 0 0 12px;
			}
			main.app p {
				color: var(--muted);
				margin: 0 0 24px;
			}
			button.counter {
				padding: 8px 16px;
				border: 1px solid var(--border);
				background: var(--bg);
				color: var(--fg);
				border-radius: 6px;
				cursor: pointer;
				font: inherit;
			}
			button.counter:hover {
				border-color: var(--accent);
			}
		</style>
		<!--ssr-head-->
	</head>
	<body>
		<!-- The server-rendered app markup (and its Suspense data <script>) is
		     injected in place of the comment below; the client then hydrates it. -->
		<div id="app"><!--ssr-body--></div>
		<script type="module" src="/src/entry-client.ts"></script>
	</body>
</html>

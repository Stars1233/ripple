<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			body {
				margin: 0;
				font:
					15px/1.6 system-ui,
					-apple-system,
					'Segoe UI',
					sans-serif;
				color: #1a1640;
			}
			.app {
				max-width: 720px;
				margin: 0 auto;
				padding: 24px;
			}
			.app-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				border-bottom: 1px solid #e5e0f5;
				padding-bottom: 12px;
			}
			.app-header nav a {
				margin-left: 16px;
			}
			a {
				color: #5e2cff;
				text-decoration: none;
			}
			.app-main {
				padding: 24px 0;
			}
			.app-footer {
				color: #8a86a8;
				font-size: 13px;
				border-top: 1px solid #e5e0f5;
				padding-top: 12px;
			}
			button.counter {
				padding: 8px 16px;
				border: 1px solid #d8d3ee;
				background: #fff;
				border-radius: 6px;
				cursor: pointer;
				font: inherit;
			}
		</style>
		<!--ssr-head-->
	</head>
	<body>
		<div id="root"><!--ssr-body--></div>
	</body>
</html>
